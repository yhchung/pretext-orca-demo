<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>범고래의 바다 — Pretext + SDF Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    html, body {
      background: #050a12; color: #c8d8e8;
      height: 100vh; overflow: hidden;
    }
    body { font-family: "Noto Serif KR", "Batang", Georgia, serif; }
    #stage { position: relative; width: 100vw; height: 100vh; overflow: hidden; user-select: none; }
    #orca-canvas {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: 10; pointer-events: none;
    }
    .line {
      position: absolute; white-space: pre; pointer-events: none; z-index: 1;
      color: #b0c8e0;
    }
    .stats-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(5,10,18,0.9); backdrop-filter: blur(12px);
      padding: 10px 24px; display: flex; gap: 32px; align-items: center;
      font: 400 12px/1 "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: rgba(255,255,255,0.35); z-index: 100;
      border-top: 1px solid rgba(100,180,255,0.1);
    }
    .stat { display: flex; gap: 6px; align-items: center; }
    .stat-value { color: rgba(150,200,255,0.7); font-weight: 600; }
    .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
    .hint {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      font: 400 13px/1 "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: rgba(255,255,255,0.25); z-index: 100;
      background: rgba(0,0,0,0.5); padding: 8px 18px; border-radius: 999px;
      pointer-events: none;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="stage"></div>
  <canvas id="orca-canvas"></canvas>
  <div class="hint">마우스를 움직여 범고래를 이끌어보세요 · SDF ray marching + Pretext reflow</div>
  <div class="stats-bar">
    <div class="stat"><span class="stat-label">Lines</span><span class="stat-value" id="sLines">0</span></div>
    <div class="stat"><span class="stat-label">Reflow</span><span class="stat-value" id="sReflow">0ms</span></div>
    <div class="stat"><span class="stat-label">FPS</span><span class="stat-value" id="sFps">60</span></div>
  </div>

  <!-- ── SDF Ray Marching Shader ── -->
  <script id="frag" type="x-shader/x-fragment">
    precision highp float;
    uniform vec2 uResolution;
    uniform vec2 uOrca;    // orca center in pixels
    uniform float uAngle;  // heading angle
    uniform float uTime;

    // ── SDF primitives ──
    float sdSphere(vec3 p, float r) { return length(p) - r; }
    float sdEllipsoid(vec3 p, vec3 r) { float k0 = length(p/r); float k1 = length(p/(r*r)); return k0*(k0-1.0)/k1; }
    float sdCappedCone(vec3 p, float h, float r1, float r2) {
      vec2 q = vec2(length(p.xz), p.y);
      vec2 k1 = vec2(r2, h); vec2 k2 = vec2(r2-r1, 2.0*h);
      vec2 ca = vec2(q.x-min(q.x,(q.y<0.0)?r1:r2), abs(q.y)-h);
      vec2 cb = q - k1 + k2*clamp(dot(k1-q,k2)/dot(k2,k2), 0.0, 1.0);
      float s = (cb.x<0.0 && ca.y<0.0) ? -1.0 : 1.0;
      return s*sqrt(min(dot(ca,ca),dot(cb,cb)));
    }
    float smin(float a, float b, float k) { float h = clamp(0.5+0.5*(b-a)/k, 0.0, 1.0); return mix(b,a,h) - k*h*(1.0-h); }
    float smax(float a, float b, float k) { return -smin(-a,-b,k); }
    mat2 rot2(float a) { float c=cos(a),s=sin(a); return mat2(c,-s,s,c); }

    // ── Orca SDF (local space, ~1.0 unit scale) ──
    // Returns vec2(distance, materialID)
    // mat 0=black skin, 1=white belly/patches, 2=eye
    vec2 mapOrca(vec3 p) {
      // Tail sway animation
      float tailPhase = uTime * 3.0;
      float sway = sin(tailPhase) * 0.08;
      // Progressive bend along body length
      p.y += sway * smoothstep(-0.2, 1.0, p.x) * p.x;

      // Main body - elongated ellipsoid
      float body = sdEllipsoid(p, vec3(1.0, 0.32, 0.34));

      // Head bulge
      float head = sdEllipsoid(p - vec3(-0.7, -0.02, 0.0), vec3(0.45, 0.30, 0.32));
      body = smin(body, head, 0.3);

      // Melon (forehead bump)
      float melon = sdSphere(p - vec3(-0.85, -0.08, 0.0), 0.22);
      body = smin(body, melon, 0.15);

      // Rostrum (snout)
      float snout = sdEllipsoid(p - vec3(-1.15, 0.05, 0.0), vec3(0.25, 0.14, 0.16));
      body = smin(body, snout, 0.15);

      // Tail stock (narrowing)
      float tailStock = sdEllipsoid(p - vec3(0.85, 0.0, 0.0), vec3(0.35, 0.15, 0.12));
      body = smin(body, tailStock, 0.25);

      float d = body;
      float mat = 0.0;

      // Dorsal fin
      vec3 dp = p - vec3(0.05, -0.32, 0.0);
      dp.xy *= rot2(0.15);
      float dorsal = sdEllipsoid(dp, vec3(0.06, 0.35, 0.03));
      // Taper top
      dorsal = smax(dorsal, -(dp.y + 0.35), 0.02);
      d = smin(d, dorsal, 0.06);

      // Tail flukes
      vec3 tp1 = p - vec3(1.25, 0.08, 0.18);
      tp1.xy *= rot2(-0.2); tp1.xz *= rot2(0.4);
      float fluke1 = sdEllipsoid(tp1, vec3(0.22, 0.025, 0.14));
      d = smin(d, fluke1, 0.06);

      vec3 tp2 = p - vec3(1.25, 0.08, -0.18);
      tp2.xy *= rot2(-0.2); tp2.xz *= rot2(-0.4);
      float fluke2 = sdEllipsoid(tp2, vec3(0.22, 0.025, 0.14));
      d = smin(d, fluke2, 0.06);

      // Pectoral fins
      vec3 pf1 = p - vec3(-0.35, 0.22, 0.30);
      pf1.xy *= rot2(0.6); pf1.xz *= rot2(0.3);
      float pfin1 = sdEllipsoid(pf1, vec3(0.22, 0.02, 0.10));
      d = smin(d, pfin1, 0.04);

      vec3 pf2 = p - vec3(-0.35, 0.22, -0.30);
      pf2.xy *= rot2(0.6); pf2.xz *= rot2(-0.3);
      float pfin2 = sdEllipsoid(pf2, vec3(0.22, 0.02, 0.10));
      d = smin(d, pfin2, 0.04);

      // ── White patches (material) ──
      // Belly
      float belly = sdEllipsoid(p - vec3(-0.1, 0.18, 0.0), vec3(0.75, 0.22, 0.28));
      // Eye patch
      float eyePatchR = sdEllipsoid(p - vec3(-0.68, -0.04, 0.26), vec3(0.12, 0.07, 0.06));
      float eyePatchL = sdEllipsoid(p - vec3(-0.68, -0.04, -0.26), vec3(0.12, 0.07, 0.06));
      // Saddle patch (behind dorsal)
      float saddle = sdEllipsoid(p - vec3(0.3, -0.18, 0.0), vec3(0.25, 0.10, 0.28));

      float whiteParts = min(belly, min(min(eyePatchR, eyePatchL), saddle));
      if (whiteParts < 0.02) mat = 1.0;

      // Eye
      float eyeR = sdSphere(p - vec3(-0.76, -0.02, 0.28), 0.025);
      float eyeL = sdSphere(p - vec3(-0.76, -0.02, -0.28), 0.025);
      if (min(eyeR, eyeL) < 0.01) mat = 2.0;

      return vec2(d, mat);
    }

    // ── Scene SDF ──
    vec2 map(vec3 p) {
      // Transform to orca local space
      vec2 orcaNDC = (uOrca / uResolution) * 2.0 - 1.0;
      orcaNDC.y = -orcaNDC.y;
      vec3 orcaPos = vec3(orcaNDC * vec2(uResolution.x/uResolution.y, 1.0) * 1.5, 0.0);

      vec3 lp = p - orcaPos;
      // Rotate to face heading
      lp.xz *= rot2(-uAngle);
      // Scale: the orca is about 2 units long in local, we want it ~0.6 in world
      lp /= 0.45;
      vec2 orca = mapOrca(lp);
      orca.x *= 0.45;

      return orca;
    }

    vec3 calcNormal(vec3 p) {
      vec2 e = vec2(0.001, 0.0);
      return normalize(vec3(
        map(p+e.xyy).x - map(p-e.xyy).x,
        map(p+e.yxy).x - map(p-e.yxy).x,
        map(p+e.yyx).x - map(p-e.yyx).x
      ));
    }

    void main() {
      vec2 uv = (gl_FragCoord.xy - 0.5*uResolution) / uResolution.y;

      // Camera
      vec3 ro = vec3(0.0, 0.0, -2.5);
      vec3 rd = normalize(vec3(uv, 1.2));

      // Ray march
      float t = 0.0;
      vec2 h;
      bool hit = false;
      for (int i = 0; i < 80; i++) {
        vec3 p = ro + rd * t;
        h = map(p);
        if (h.x < 0.001) { hit = true; break; }
        if (t > 6.0) break;
        t += h.x;
      }

      vec4 col = vec4(0.0); // transparent background

      if (hit) {
        vec3 p = ro + rd * t;
        vec3 n = calcNormal(p);

        // Lighting
        vec3 lightDir = normalize(vec3(-0.5, -0.8, -0.6));
        float diff = max(dot(n, -lightDir), 0.0);
        float spec = pow(max(dot(reflect(lightDir, n), -rd), 0.0), 32.0);
        float rim = pow(1.0 - max(dot(n, -rd), 0.0), 3.0);
        float ao = 0.5 + 0.5 * n.y;
        float fresnel = 0.04 + 0.96 * pow(1.0 - max(dot(n, -rd), 0.0), 5.0);

        vec3 baseColor;
        if (h.y < 0.5) {
          // Black skin
          baseColor = vec3(0.08, 0.08, 0.12);
        } else if (h.y < 1.5) {
          // White patches
          baseColor = vec3(0.92, 0.92, 0.95);
        } else {
          // Eye - dark with slight glint
          baseColor = vec3(0.02, 0.02, 0.05);
          spec *= 3.0;
        }

        vec3 ambient = vec3(0.05, 0.08, 0.15) * ao;
        vec3 diffuse = baseColor * diff * vec3(0.6, 0.7, 0.9);
        vec3 specular = vec3(0.5, 0.7, 1.0) * spec;
        vec3 rimLight = vec3(0.15, 0.3, 0.6) * rim;

        // Subsurface scattering for white parts
        float sss = 0.0;
        if (h.y > 0.5 && h.y < 1.5) {
          sss = max(dot(n, lightDir), 0.0) * 0.3;
        }

        vec3 c = ambient + diffuse + specular + rimLight + vec3(0.4, 0.6, 0.9) * sss;

        // Water caustics reflection
        c += vec3(0.1, 0.2, 0.4) * fresnel * 0.5;

        // Fog / depth
        float fog = exp(-t * 0.3);
        c = mix(vec3(0.02, 0.05, 0.12), c, fog);

        col = vec4(c, 1.0);
      }

      gl_FragColor = col;
    }
  </script>

  <script type="module">
    import { prepareWithSegments, layoutNextLine } from 'https://somnai-dreams.github.io/pretext-demos/pretext.js'

    // ── WebGL SDF Setup ──
    const canvas = document.getElementById('orca-canvas')
    const gl = canvas.getContext('webgl', { alpha: true, premultipliedAlpha: false })
    gl.enable(gl.BLEND)
    gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA)

    function compileShader(src, type) {
      const s = gl.createShader(type)
      gl.shaderSource(s, src)
      gl.compileShader(s)
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s))
      return s
    }

    const vs = compileShader(`attribute vec2 a;void main(){gl_Position=vec4(a,0,1);}`, gl.VERTEX_SHADER)
    const fs = compileShader(document.getElementById('frag').textContent, gl.FRAGMENT_SHADER)
    const prog = gl.createProgram()
    gl.attachShader(prog, vs); gl.attachShader(prog, fs); gl.linkProgram(prog); gl.useProgram(prog)

    const buf = gl.createBuffer()
    gl.bindBuffer(gl.ARRAY_BUFFER, buf)
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW)
    const aLoc = gl.getAttribLocation(prog, 'a')
    gl.enableVertexAttribArray(aLoc)
    gl.vertexAttribPointer(aLoc, 2, gl.FLOAT, false, 0, 0)

    const uRes = gl.getUniformLocation(prog, 'uResolution')
    const uOrcaLoc = gl.getUniformLocation(prog, 'uOrca')
    const uAngleLoc = gl.getUniformLocation(prog, 'uAngle')
    const uTimeLoc = gl.getUniformLocation(prog, 'uTime')

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1
      // Render at reduced resolution for performance
      const scale = Math.min(dpr, 1.5)
      canvas.width = window.innerWidth * scale
      canvas.height = window.innerHeight * scale
      canvas.style.width = window.innerWidth + 'px'
      canvas.style.height = window.innerHeight + 'px'
      gl.viewport(0, 0, canvas.width, canvas.height)
    }
    resizeCanvas()
    window.addEventListener('resize', resizeCanvas)

    // ── Text ──
    const bodyText = `깊고 푸른 바다 한가운데, 범고래 한 마리가 유유히 헤엄치고 있다. 그 거대한 몸은 파도를 가르며 물살을 만들어내고, 주변의 모든 것들이 그 움직임에 반응한다. 바다는 고요하지만 살아 숨 쉬고 있으며, 범고래의 등지느러미가 수면 위로 솟아오를 때마다 빛이 반사되어 은빛 물보라가 흩날린다. 범고래는 지구상에서 가장 지능이 높은 해양 포유류 중 하나다. 그들은 가족 단위로 무리를 이루어 살아가며, 각 무리는 고유한 소리와 사냥 방식을 가지고 있다. 이것은 마치 하나의 문화와도 같다. 어미 범고래는 자신의 지식과 경험을 새끼에게 전수하고, 이 전통은 세대를 넘어 이어져 내려온다. 태평양의 차가운 물속에서 그들은 연어를 쫓아 수백 킬로미터를 이동한다. 때로는 수면 위로 뛰어올라 장엄한 점프를 선보이기도 하는데, 그 순간 시간이 멈춘 듯 온 세상이 고요해진다. 중력을 거스르는 듯한 그 비상은 자유 그 자체의 표현이다. 바다의 어둠 속에서 범고래의 흑백 무늬는 놀라운 위장 효과를 발휘한다. 위에서 내려다보면 어두운 등이 심해와 섞이고, 아래에서 올려다보면 밝은 배가 수면의 빛과 어우러진다. 자연이 만들어낸 가장 아름다운 디자인 중 하나라 할 수 있다. 이 광활한 바다에서 범고래는 단순한 포식자가 아니다. 그들은 생태계의 균형을 유지하는 핵심 종이며, 바다의 건강을 나타내는 지표이기도 하다. 범고래가 자유롭게 헤엄칠 수 있는 바다는 곧 건강한 바다다. 우리가 이 장엄한 생명체를 보호해야 하는 이유가 바로 여기에 있다. 범고래의 사회 구조는 모계 중심이다. 할머니 범고래가 무리의 리더 역할을 하며, 먹이가 있는 곳으로 가족을 이끈다. 놀랍게도 할머니 범고래는 폐경기를 겪는 몇 안 되는 동물 중 하나인데, 이는 직접 번식하는 대신 손주 세대의 생존을 돕는 데 집중하기 위한 진화적 선택이라고 과학자들은 설명한다. 범고래는 음파를 이용한 반향정위로 사냥하고 소통한다. 각 무리는 고유한 방언을 가지고 있어서, 연구자들은 소리만 듣고도 어떤 무리인지 구별할 수 있다. 이 복잡한 의사소통 체계는 인간의 언어만큼이나 정교하다. 북극에서 남극까지, 범고래는 지구의 모든 바다에서 발견된다. 그들은 환경에 적응하는 놀라운 능력을 보여주며, 각 지역의 범고래는 서로 다른 먹이와 사냥 전략을 발전시켜 왔다. 어떤 무리는 물개를, 어떤 무리는 상어를, 또 어떤 무리는 대왕고래까지 사냥한다. 범고래의 지능은 거울 자기인식 테스트를 통과할 정도로 높다. 그들은 놀이를 즐기고, 슬픔을 표현하며, 동료가 죽으면 며칠간 시신 곁을 떠나지 않는 모습도 관찰된다. 이러한 감정적 깊이는 우리가 이 생명체를 어떻게 대해야 하는지를 다시 생각하게 만든다.`

    const BODY_FONT_SIZE = 17
    const BODY_LINE_HEIGHT = 30
    const MARGIN = 30
    const ORCA_RADIUS = 110
    const ORCA_H_PAD = 40
    const ORCA_V_PAD = 20

    const stage = document.getElementById('stage')
    const sLines = document.getElementById('sLines')
    const sReflow = document.getElementById('sReflow')
    const sFps = document.getElementById('sFps')

    let orcaX, orcaY, orcaVx = 0, orcaVy = 0, orcaAngle = 0
    let mouseX = -1, mouseY = -1

    const linePool = []
    let linePoolIdx = 0

    function acquireLine() {
      if (linePoolIdx < linePool.length) {
        const el = linePool[linePoolIdx++]; el.style.display = ''; return el
      }
      const el = document.createElement('div')
      el.className = 'line'
      stage.appendChild(el)
      linePool.push(el)
      linePoolIdx++
      return el
    }
    function hideUnused() {
      for (let i = linePoolIdx; i < linePool.length; i++) linePool[i].style.display = 'none'
    }

    function circleIntervalForBand(cx, cy, r, bandTop, bandBot, hPad, vPad) {
      const effectiveR = r + vPad
      const closestY = Math.max(bandTop, Math.min(cy, bandBot))
      const dy = closestY - cy
      if (Math.abs(dy) >= effectiveR) return null
      const dx = Math.sqrt(effectiveR * effectiveR - dy * dy) + hPad
      return { left: cx - dx, right: cx + dx }
    }

    function carveSlots(region, blocked) {
      let slots = [region]
      for (const b of blocked) {
        const next = []
        for (const s of slots) {
          if (b.right <= s.left || b.left >= s.right) { next.push(s); continue }
          if (b.left > s.left) next.push({ left: s.left, right: b.left })
          if (b.right < s.right) next.push({ left: b.right, right: s.right })
        }
        slots = next
      }
      return slots.filter(s => (s.right - s.left) > 40)
    }

    let bodyPrepared, ready = false

    async function init() {
      await document.fonts.ready
      bodyPrepared = prepareWithSegments(bodyText, `${BODY_FONT_SIZE}px "Noto Serif KR", Georgia, serif`)

      const w = window.innerWidth, h = window.innerHeight
      orcaX = w * 0.5; orcaY = h * 0.4

      document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY })
      document.addEventListener('touchmove', e => {
        mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY
      }, { passive: true })

      ready = true
      requestAnimationFrame(loop)
    }

    let lastFpsTime = 0, frameCount = 0, displayFps = 60
    let smoothAngle = 0

    function loop(t) {
      if (!ready) return
      requestAnimationFrame(loop)

      frameCount++
      if (t - lastFpsTime > 500) {
        displayFps = Math.round(frameCount / ((t - lastFpsTime) / 1000))
        frameCount = 0; lastFpsTime = t
      }

      // ── Update orca position ──
      if (mouseX > 0) {
        const ease = 0.08
        const prevX = orcaX, prevY = orcaY
        orcaX += (mouseX - orcaX) * ease
        orcaY += (mouseY - orcaY) * ease
        orcaVx = orcaX - prevX; orcaVy = orcaY - prevY
      } else {
        const swimT = t * 0.0008
        const w = window.innerWidth, h = window.innerHeight
        orcaX = w * 0.5 + Math.cos(swimT) * w * 0.3
        orcaY = h * 0.5 + Math.sin(swimT * 1.7) * h * 0.25
        orcaVx = -Math.sin(swimT) * 2; orcaVy = Math.cos(swimT * 1.7) * 1.5
      }

      const targetAngle = Math.atan2(orcaVy, orcaVx)
      smoothAngle += (targetAngle - smoothAngle) * 0.1
      orcaAngle = smoothAngle

      // ── Render SDF orca ──
      gl.clearColor(0, 0, 0, 0)
      gl.clear(gl.COLOR_BUFFER_BIT)
      gl.uniform2f(uRes, canvas.width, canvas.height)
      gl.uniform2f(uOrcaLoc, orcaX * (canvas.width / window.innerWidth), (window.innerHeight - orcaY) * (canvas.height / window.innerHeight))
      gl.uniform1f(uAngleLoc, orcaAngle)
      gl.uniform1f(uTimeLoc, t * 0.001)
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4)

      // ── Reflow text ──
      const perfStart = performance.now()
      linePoolIdx = 0

      const W = window.innerWidth, H = window.innerHeight
      const contentH = H - MARGIN - 60
      const obs = [{ cx: orcaX, cy: orcaY, r: ORCA_RADIUS, hPad: ORCA_H_PAD, vPad: ORCA_V_PAD }]

      let y = MARGIN, totalLines = 0
      let bodyCursor = { segmentIndex: 0, graphemeIndex: 0 }

      while (y + BODY_LINE_HEIGHT <= MARGIN + contentH) {
        const blocked = []
        for (const c of obs) {
          const iv = circleIntervalForBand(c.cx, c.cy, c.r, y, y + BODY_LINE_HEIGHT, c.hPad, c.vPad)
          if (iv) blocked.push(iv)
        }
        const slots = carveSlots({ left: MARGIN, right: W - MARGIN }, blocked)
        if (slots.length === 0) { y += BODY_LINE_HEIGHT; continue }

        let exhausted = false
        for (const slot of slots) {
          const line = layoutNextLine(bodyPrepared, bodyCursor, slot.right - slot.left)
          if (!line) { exhausted = true; break }

          const lineCY = y + BODY_LINE_HEIGHT / 2
          const lineCX = (slot.left + slot.right) / 2
          const dx = lineCX - orcaX, dy = lineCY - orcaY
          const dist = Math.sqrt(dx * dx + dy * dy)
          const maxDist = ORCA_RADIUS + ORCA_H_PAD + 100
          const proximity = Math.max(0, 1 - dist / maxDist)

          const el = acquireLine()
          el.style.font = `${BODY_FONT_SIZE}px "Noto Serif KR", Georgia, serif`
          el.style.left = slot.left + 'px'
          el.style.top = y + 'px'
          el.textContent = line.text

          const lift = proximity * 8
          const scale = 1 + proximity * 0.06
          const blue = Math.round(180 + proximity * 75)
          el.style.transform = `translateY(${-lift}px) scale(${scale})`
          el.style.color = `rgba(${140 + proximity * 80}, ${190 + proximity * 50}, ${blue}, ${0.65 + proximity * 0.35})`
          el.style.textShadow = proximity > 0.05
            ? `0 0 ${proximity * 25}px rgba(80,160,255,${proximity * 0.6}), 0 ${proximity * 2}px ${proximity * 6}px rgba(0,0,0,0.5)`
            : 'none'

          bodyCursor = line.end
          totalLines++
        }
        if (exhausted) break
        y += BODY_LINE_HEIGHT
      }

      hideUnused()
      const perfEnd = performance.now()
      sLines.textContent = totalLines
      sReflow.textContent = (perfEnd - perfStart).toFixed(1) + 'ms'
      sFps.textContent = displayFps
    }

    init()
  </script>
</body>
</html>
